<!-- 
    Composable Stat Card Component
    Params: label, value, desc, color_class (blue, red, green, or default)
-->
<div class="stat-card {{ color_class }}">
    <span class="stat-label">{{ label }}</span>
    <div class="stat-number">{{ value }}</div>
    <span class="stat-desc">{{ desc }}</span>
</div>
