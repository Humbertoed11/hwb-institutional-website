<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Institutional Slate -->
  <rect width="1200" height="600" fill="#0f172a" />
  
  <!-- Blueprint Grid Overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" />
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#grid)" />
  <rect width="1200" height="600" fill="url(#glow)" />

  <!-- Architectural Blueprint Lines (Subtle) -->
  <g stroke="#1e293b" stroke-width="0.5">
    <line x1="100" y1="100" x2="1100" y2="100" />
    <line x1="100" y1="500" x2="1100" y2="500" />
    <line x1="100" y1="100" x2="100" y2="500" />
    <line x1="1100" y1="100" x2="1100" y2="500" />
    <!-- Interior Layout Simulation -->
    <path d="M 300 100 V 500 M 600 100 V 300 H 900 V 100 M 600 500 V 400 H 900 V 500" fill="none" />
  </g>

  <!-- SigmaFidelity™ Precision Lines (Electric Blue) -->
  <g stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pathing Algorithm Logic Visualization -->
    <path d="M 150 450 L 350 450 L 350 150 L 550 150 L 550 350 L 850 350 L 850 150 L 1050 150" fill="none" stroke-dasharray="8 8">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="5s" repeatCount="indefinite" />
    </path>
    <!-- Sigma Mark Concept -->
    <path d="M 50 50 L 80 50 L 65 65 L 80 80 L 50 80" fill="none" stroke-width="4" />
  </g>

  <!-- Typography: Institutional Standard -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="#f8fafc" letter-spacing="-2">
    SIGMA FIDELITY™
  </text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#64748b" letter-spacing="4">
    THE STANDARD FOR INFORMATION FIDELITY
  </text>
  
  <!-- ISO 9001:2015 Compliance Seal (Simulated) -->
  <circle cx="1050" cy="500" r="40" fill="none" stroke="#64748b" stroke-width="2" />
  <text x="1050" y="505" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle" fill="#64748b">
    ISO 9001:2015
  </text>
  <text x="1050" y="520" font-family="Arial, sans-serif" font-size="8" font-weight="700" text-anchor="middle" fill="#64748b">
    CERTIFIED
  </text>

  <!-- Decorative Accents -->
  <rect x="100" y="520" width="1000" height="2" fill="#3b82f6" opacity="0.5" />
  <text x="100" y="540" font-family="monospace" font-size="12" fill="#3b82f6" opacity="0.5">
    SYSTEM_STATUS: FIDELITY_LOCKED // QMS_REVISION: 1.0
  </text>
</svg>
